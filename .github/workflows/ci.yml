name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax check
        run: |
          find src -name "*.js" -exec node --check {} \;

      - name: Run tests
        run: node --test tests/*.test.js

      - name: Security scan
        run: node scripts/security-scan.js

      - name: Check no db/backup committed
        run: |
          if git ls-files | grep -E '\.(db|sqlite|bak|sqlite3)$$'; then
            echo "BLOCKED: database/backup files found in repo" && exit 1
          fi

      - name: Check no .env committed
        run: |
          if git ls-files | grep -E '\.env$$'; then
            echo "BLOCKED: .env file found in repo" && exit 1
          fi
